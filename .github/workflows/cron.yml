# Hourly scheduler for the Zahara site.
#
# Cloudflare Pages has no native cron, so this GitHub Action pings the
# /api/menu-sync endpoint once an hour. That single call does two things:
#   • Menu sync   — pulls menus from OneDrive during the configured hours
#                   (12/16/18 Israel time), deduped so extra pings are no-ops.
#   • Instagram   — rotates the long-lived Instagram token before it expires,
#                   so the home feed never goes dark.
#
# SETUP (one time):
#   1. Set the SYNC_TOKEN secret in Cloudflare:
#        wrangler pages secret put SYNC_TOKEN --project-name=zahara-restaurant
#   2. Add the SAME value as a GitHub repo secret named SYNC_TOKEN:
#        GitHub repo → Settings → Secrets and variables → Actions → New secret.
# The two values MUST match — the Action sends it, the endpoint checks it.

name: Hourly cron (menu sync + Instagram token)

on:
  schedule:
    - cron: '0 * * * *'   # top of every hour (UTC)
  workflow_dispatch: {}    # adds a "Run workflow" button for manual triggers

# Don't pile up overlapping runs if one is slow.
concurrency:
  group: zahara-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping menu-sync (also refreshes the Instagram token)
        run: |
          if [ -z "${{ secrets.SYNC_TOKEN }}" ]; then
            echo "::error::SYNC_TOKEN repo secret is not set — add it in Settings → Secrets → Actions."
            exit 1
          fi
          # -f makes curl fail the step on any non-2xx response so a broken
          # token or endpoint shows up as a red run instead of silently passing.
          curl -fsS --max-time 60 \
            "https://zahara.rest/api/menu-sync?token=${{ secrets.SYNC_TOKEN }}"
